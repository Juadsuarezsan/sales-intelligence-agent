services:
  postgres:
    image: pgvector/pgvector:pg16
    environment: { POSTGRES_USER: sales, POSTGRES_PASSWORD: sales_dev, POSTGRES_DB: sales }
    ports: ["5432:5432"]
    volumes: [postgres-data:/var/lib/postgresql/data]
    healthcheck: { test: ["CMD-SHELL","pg_isready -U sales"], interval: 5s, retries: 10 }
  api:
    build: .
    env_file: .env
    environment:
      DATABASE_URL: postgresql://sales:sales_dev@postgres:5432/sales
    depends_on: { postgres: { condition: service_healthy } }
    ports: ["8000:8000"]
    volumes: [./src:/app/src, ./data:/app/data]
volumes:
  postgres-data:
